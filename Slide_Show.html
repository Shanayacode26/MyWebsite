<html>
    <head>
        <title>
            Slide Show
        </title>
    </head>
    <body>
        <section>
            <img src="Screenshot 2026-05-24 121422.png" alt="pic1" class="slideShow" style="height: 500px;">
            <img src="aesthetic-black-blurry-pfp.webp" alt="pic2" class="slideShow" style="height: 500px;">
            <img src="siddhivinayak int cover.jpg" alt="pic3" class="slideShow" style="height: 500px;">
        </section>
        <script>
    var my_index = 0;
    slide();
    function slide() {
        var i;
        var x = document.getElementsByClassName("slideShow");
        for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";
        }
        my_index++;
        if (my_index > x.length) { my_index = 1 }
        x[my_index - 1].style.display = "block";
        setTimeout(slide, 3000);
    }           
        </script>   
            
        
    </body>
</html>
